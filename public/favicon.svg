<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cupGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="steamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="qrGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44403c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#fafaf9" stroke="#e7e5e4" stroke-width="2"/>
  
  <!-- QR Code pattern (simplified) -->
  <g transform="translate(25, 32)" fill="url(#qrGradient)">
    <!-- QR Code squares -->
    <rect x="0" y="0" width="12" height="12" rx="1"/>
    <rect x="38" y="0" width="12" height="12" rx="1"/>
    <rect x="0" y="24" width="12" height="12" rx="1"/>
    <rect x="16" y="6" width="6" height="6" rx="1"/>
    <rect x="28" y="6" width="4" height="6" rx="1"/>
    <rect x="16" y="18" width="4" height="4" rx="1"/>
    <rect x="24" y="18" width="6" height="6" rx="1"/>
    <rect x="34" y="18" width="4" height="4" rx="1"/>
    <rect x="42" y="18" width="8" height="4" rx="1"/>
    <rect x="16" y="26" width="6" height="4" rx="1"/>
    <rect x="26" y="26" width="4" height="6" rx="1"/>
    <rect x="34" y="26" width="6" height="4" rx="1"/>
    <rect x="44" y="24" width="6" height="6" rx="1"/>
    <rect x="0" y="36" width="6" height="4" rx="1"/>
    <rect x="10" y="36" width="4" height="4" rx="1"/>
    <rect x="18" y="34" width="4" height="6" rx="1"/>
    <rect x="26" y="34" width="6" height="6" rx="1"/>
    <rect x="36" y="36" width="4" height="4" rx="1"/>
    <rect x="44" y="34" width="6" height="6" rx="1"/>
  </g>
  
  <!-- Coffee cup -->
  <path d="M30 62 L30 72 C30 76 33 79 37 79 L63 79 C67 79 70 76 70 72 L70 62 Z" fill="url(#cupGradient)"/>
  <ellipse cx="50" cy="62" rx="20" ry="6" fill="#78350f"/>
  <ellipse cx="50" cy="62" rx="16" ry="4" fill="#451a03"/>
  
  <!-- Steam -->
  <g stroke="url(#steamGradient)" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M42 55 Q40 50 42 45"/>
    <path d="M50 55 Q48 48 50 42"/>
    <path d="M58 55 Q56 50 58 45"/>
  </g>
  
  <!-- Coffee bean accent -->
  <ellipse cx="72" cy="70" rx="5" ry="7" fill="#92400e" transform="rotate(45 72 70)"/>
  <path d="M70 68 L74 72" stroke="#451a03" stroke-width="1" opacity="0.5"/>
</svg>